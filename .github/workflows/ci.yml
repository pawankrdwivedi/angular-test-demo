name: CI Automation Run

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Execution target environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Cucumber BDD Tests
      run: |
        ENV_NAME=${{ github.event.inputs.environment || 'qa' }}
        npm run test -- --env=$ENV_NAME

    - name: Generate Allure Report
      if: always()
      run: |
        npm run allure:generate || true

    - name: Upload Test Report & Evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-execution-reports
        path: |
          reports/
          allure-report/
          test_logs/
        retention-days: 10
